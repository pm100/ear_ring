name: CD – Build & Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag / version (e.g. v1.2.3)'
        required: true
      ios_build_number:
        description: 'iOS CFBundleVersion (must be > last TestFlight build number)'
        required: true
      version_code:
        description: 'Android versionCode (integer, must be > current Play Store versionCode)'
        required: true
      release_notes:
        description: 'Release notes (shown in app stores and GitHub Release)'
        required: false
        default: 'Bug fixes and improvements.'

concurrency:
  group: cd
  cancel-in-progress: false

# Minimum permissions. Jobs that push to GitHub Releases need contents:write.
permissions:
  contents: write

jobs:
  # ── 1. Create a draft GitHub release ──────────────────────────────────────
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - name: Create (or update) draft release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.version }}
          name: 'EarRing ${{ inputs.version }}'
          body: ${{ inputs.release_notes }}
          draft: true
          # Safe to rerun: updates the release if it already exists at this tag.
          allowUpdates: true
          updateOnlyUnreleased: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. iOS → TestFlight ───────────────────────────────────────────────────
  ios:
    name: iOS → TestFlight
    runs-on: macos-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust iOS target
        run: rustup target add aarch64-apple-ios

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Import Apple Distribution certificate
        env:
          CERT_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD:   ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          KEYCHAIN_PATH=$RUNNER_TEMP/ios-build.keychain
          echo "$CERT_P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode > $RUNNER_TEMP/profile.mobileprovision
          UUID=$(security cms -D -i $RUNNER_TEMP/profile.mobileprovision | \
                 plutil -extract UUID raw -)
          cp $RUNNER_TEMP/profile.mobileprovision \
             ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.APP_STORE_CONNECT_KEY_P8_BASE64 }}" | base64 --decode \
            > ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      - name: Bump iOS build number
        run: |
          cd ios
          agvtool new-version -all ${{ inputs.ios_build_number }}

      - name: Archive
        run: |
          cd ios
          xcodebuild archive \
            -project earring.xcodeproj \
            -scheme earring \
            -configuration Release \
            -archivePath /tmp/earring.xcarchive \
            -authenticationKeyPath \
              ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID      "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath /tmp/earring.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath /tmp/earring_export \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            -f /tmp/earring_export/earring.ipa \
            -t ios \
            --apiKey    "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            --output-format xml

  # ── 3. Android → Play Store internal testing ──────────────────────────────
  android:
    name: Android → Play Store (internal)
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Rust Android targets
        run: rustup target add aarch64-linux-android x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Install Android NDK 27
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/earring-upload.jks

      - name: Build release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          VERSION_CODE:      ${{ inputs.version_code }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install publish-script dependencies
        run: npm ci
        working-directory: scripts

      - name: Write service account key
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: echo "$SERVICE_ACCOUNT_JSON" > $RUNNER_TEMP/service_account.json

      - name: Upload to Play Store (internal track)
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ runner.temp }}/service_account.json
          PLAY_RELEASE_STATUS: completed
          PLAY_RELEASE_NOTES:  ${{ inputs.release_notes }}
        run: node scripts/publish_android.js

  # ── 4. macOS desktop → GitHub Release ────────────────────────────────────
  desktop-mac:
    name: macOS desktop → GitHub Release
    runs-on: macos-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: desktop

      - name: Install Tauri CLI v1
        run: npm install -g @tauri-apps/cli@1

      - name: Build macOS app (sign + notarise)
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              9A4PVL859F
        run: |
          cd desktop
          tauri build

      - name: Upload DMG to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ inputs.version }} \
            desktop/src-tauri/target/release/bundle/dmg/*.dmg \
            --repo ${{ github.repository }} \
            --clobber

  # ── 5. Windows desktop → GitHub Release ──────────────────────────────────
  desktop-windows:
    name: Windows desktop → GitHub Release
    runs-on: windows-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: desktop

      - name: Install Tauri CLI v1
        run: npm install -g @tauri-apps/cli@1

      - name: Build Windows app
        run: |
          cd desktop
          tauri build

      - name: Upload MSI to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload ${{ inputs.version }} \
            desktop/src-tauri/target/release/bundle/msi/*.msi \
            --repo ${{ github.repository }} \
            --clobber

  # ── 6. Publish release (un-draft) when all jobs succeed ───────────────────
  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [ios, android, desktop-mac, desktop-windows]
    steps:
      - name: Un-draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ inputs.version }} \
            --draft=false \
            --repo ${{ github.repository }}
